<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Auto-Rebalancer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0d13;
            color: #e8ecf4;
            font-family: 'Inter', 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #1e2636;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            color: #5b8cff;
            margin-bottom: 5px;
        }

        .header p {
            color: #6b7a99;
            font-size: 14px;
        }

        .status-box {
            background: #111620;
            border: 1px solid #1e2636;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1e2636;
        }

        .status-row:last-child {
            border-bottom: none;
        }

        .status-label {
            font-size: 13px;
            color: #6b7a99;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .status-value {
            font-size: 16px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-value.green {
            color: #00d4a1;
        }

        .status-value.red {
            color: #ff4d6a;
        }

        .status-value.blue {
            color: #5b8cff;
        }

        .logs {
            background: #111620;
            border: 1px solid #1e2636;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #1e2636;
            color: #6b7a99;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry.trade {
            color: #00d4a1;
        }

        .log-entry.error {
            color: #ff4d6a;
        }

        .log-entry.info {
            color: #5b8cff;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .btn-start {
            background: linear-gradient(135deg, #00d4a1, #00b88d);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 212, 161, 0.3);
        }

        .btn-stop {
            background: #2c3e50;
            color: #e8ecf4;
        }

        .btn-stop:hover {
            background: #34495e;
        }

        .btn-stop:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .indicator.active {
            background: #00d4a1;
            animation: pulse 1s infinite;
        }

        .indicator.inactive {
            background: #6b7a99;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-label .indicator {
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Auto-Rebalancer</h1>
            <p>NASDAQ-driven portfolio rebalancing</p>
        </div>

        <div class="status-box">
            <div class="status-row">
                <span class="status-label"><span class="indicator" id="indicator"></span>Status</span>
                <span class="status-value" id="status">Idle</span>
            </div>
            <div class="status-row">
                <span class="status-label">Current NASDAQ</span>
                <span class="status-value blue" id="nasdaqPrice">--</span>
            </div>
            <div class="status-row">
                <span class="status-label">% Change (5s)</span>
                <span class="status-value" id="percentChange">--</span>
            </div>
            <div class="status-row">
                <span class="status-label">Admin Balance</span>
                <span class="status-value blue" id="adminBalance">--</span>
            </div>
            <div class="status-row">
                <span class="status-label">Position (STOCK_A)</span>
                <span class="status-value" id="adminPosition">None</span>
            </div>
            <div class="status-row">
                <span class="status-label">Last Update</span>
                <span class="status-value" id="lastUpdate">Never</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startRebalancer()">Start Auto-Rebalance</button>
            <button class="btn-stop" id="stopBtn" onclick="stopRebalancer()" disabled>Stop</button>
        </div>

        <div class="logs">
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        let rebalancerActive = false;
        let rebalancerInterval = null;
        let lastNasdaqPrice = null;
        let lastCheckTime = 0;
        let adminUserId = null;
        const CHECK_INTERVAL = 5000; // 5 seconds

        const API_BASE = 'http://localhost:3000/api';

        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            container.insertBefore(entry, container.firstChild);

            // Keep only last 50 logs
            while (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        function updateUI() {
            const indicator = document.getElementById('indicator');
            const statusEl = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');

            if (rebalancerActive) {
                indicator.className = 'indicator active';
                statusEl.textContent = 'Running';
                statusEl.className = 'status-value green';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                indicator.className = 'indicator inactive';
                statusEl.textContent = 'Stopped';
                statusEl.className = 'status-value';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        async function fetchAdminUser() {
            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: 'admin' })
                });
                const data = await res.json();
                adminUserId = data.id;
                document.getElementById('adminBalance').textContent = `$${data.balance.toFixed(2)}`;
                return data;
            } catch (err) {
                log(`Error fetching admin user: ${err.message}`, 'error');
                return null;
            }
        }

        async function getAdminState() {
            if (!adminUserId) return null;
            try {
                const res = await fetch(`${API_BASE}/user?id=${adminUserId}`);
                const data = await res.json();
                document.getElementById('adminBalance').textContent = `$${data.balance.toFixed(2)}`;

                // Update position display
                const pos = data.positions.find(p => p.asset === 'STOCK_A');
                if (pos) {
                    document.getElementById('adminPosition').textContent = `${pos.type} ${pos.shares} @ $${pos.entryPrice.toFixed(2)}`;
                    if (pos.type === 'LONG') {
                        document.getElementById('adminPosition').className = 'status-value green';
                    } else {
                        document.getElementById('adminPosition').className = 'status-value red';
                    }
                } else {
                    document.getElementById('adminPosition').textContent = 'None';
                    document.getElementById('adminPosition').className = 'status-value';
                }

                return data;
            } catch (err) {
                log(`Error fetching admin state: ${err.message}`, 'error');
                return null;
            }
        }

        async function getNasdaqPrice() {
            try {
                const res = await fetch('http://localhost:3000/nasdaq');
                const data = await res.json();
                return data['nasdaq-composite-index']?.usd;
            } catch (err) {
                log(`Error fetching NASDAQ price: ${err.message}`, 'error');
                return null;
            }
        }

        async function liquidatePosition(adminState) {
            const pos = adminState.positions.find(p => p.asset === 'STOCK_A');
            if (!pos) return null;

            const action = pos.type === 'LONG' ? 'SELL' : 'COVER';
            try {
                const res = await fetch(`${API_BASE}/trade`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: adminUserId,
                        asset: 'STOCK_A',
                        action,
                        shares: pos.shares
                    })
                });
                const data = await res.json();
                if (data.success) {
                    log(`Liquidated ${action} ${pos.shares} shares @ $${data.fillPrice.toFixed(2)}`, 'trade');
                    return data;
                }
            } catch (err) {
                log(`Error liquidating position: ${err.message}`, 'error');
            }
            return null;
        }

        async function openPosition(action, shares) {
            if (shares <= 0) return null;

            try {
                const res = await fetch(`${API_BASE}/trade`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: adminUserId,
                        asset: 'STOCK_A',
                        action,
                        shares
                    })
                });
                const data = await res.json();
                if (data.success) {
                    log(`Opened ${action} ${shares} shares @ $${data.fillPrice.toFixed(2)}`, 'trade');
                    return data;
                }
            } catch (err) {
                log(`Error opening position: ${err.message}`, 'error');
            }
            return null;
        }

        async function rebalance() {
            const now = Date.now();
            if (now - lastCheckTime < CHECK_INTERVAL) {
                return; // Not enough time has passed
            }
            lastCheckTime = now;

            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

            // Fetch NASDAQ price
            const nasdaqPrice = await getNasdaqPrice();
            if (!nasdaqPrice) return;

            document.getElementById('nasdaqPrice').textContent = nasdaqPrice.toFixed(2);

            // Calculate percentage change
            let percentChange = 0;
            if (lastNasdaqPrice) {
                percentChange = ((nasdaqPrice - lastNasdaqPrice) / lastNasdaqPrice) * 100;
                const changeEl = document.getElementById('percentChange');
                changeEl.textContent = percentChange.toFixed(2) + '%';
                changeEl.className = 'status-value ' + (percentChange > 0 ? 'green' : percentChange < 0 ? 'red' : '');
            }

            lastNasdaqPrice = nasdaqPrice;

            // Only rebalance if change > 0.01%
            if (Math.abs(percentChange) > 0.01) {
                log(`NASDAQ moved ${percentChange.toFixed(2)}% - rebalancing...`, 'info');

                // Get current admin state
                const adminState = await getAdminState();
                if (!adminState) return;

                // Liquidate existing position
                const pos = adminState.positions.find(p => p.asset === 'STOCK_A');
                if (pos && pos.shares > 0) {
                    await liquidatePosition(adminState);
                    // Wait a moment for state to update
                    await new Promise(r => setTimeout(r, 100));
                }

                // Open new position based on direction
                const sharesToTrade = Math.floor(Math.abs(percentChange));
                const action = percentChange > 0 ? 'BUY' : 'SHORT';

                if (sharesToTrade > 0) {
                    await openPosition(action, sharesToTrade);
                    // Refresh admin state
                    await getAdminState();
                }
            }
        }

        async function startRebalancer() {
            if (rebalancerActive) return;

            log('Starting auto-rebalancer...', 'info');

            // Ensure admin user exists
            if (!adminUserId) {
                const admin = await fetchAdminUser();
                if (!admin) {
                    log('Failed to initialize admin user', 'error');
                    return;
                }
            }

            // Get initial NASDAQ price
            const price = await getNasdaqPrice();
            if (!price) {
                log('Failed to fetch initial NASDAQ price', 'error');
                return;
            }

            lastNasdaqPrice = price;
            lastCheckTime = Date.now();
            rebalancerActive = true;
            updateUI();

            log('Auto-rebalancer started. Checking every 5 seconds...', 'info');

            // Start polling
            rebalancerInterval = setInterval(rebalance, 1000); // Check every 1 second if 5 seconds have passed
        }

        function stopRebalancer() {
            if (!rebalancerActive) return;

            rebalancerActive = false;
            if (rebalancerInterval) {
                clearInterval(rebalancerInterval);
                rebalancerInterval = null;
            }

            updateUI();
            log('Auto-rebalancer stopped', 'info');
        }

        // Initialize
        async function init() {
            updateUI();
            await fetchAdminUser();
            if (adminUserId) {
                await getAdminState();
            }
        }

        init();
    </script>
</body>
</html>
