<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Exchange</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0B0E14',
                        panel: '#151924',
                        panelBorder: '#2B3139',
                        green: '#2EBD85',
                        red: '#F6465D',
                        text: '#EAECEF',
                        textMuted: '#848E9C'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0E14; color: #EAECEF; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2B3139; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="p-8 rounded-xl shadow-2xl w-96 border bg-panel border-panelBorder">
            <h1 class="text-2xl font-bold mb-6 text-center">Mock Exchange</h1>
            <p class="text-sm mb-4 text-textMuted">
                Trade Stock_A and Crypto_A. $100 flat fee + 0.01% per trade. Connecting to live worker.
            </p>
            <input 
                type="text" 
                id="nickname-input"
                placeholder="Enter your nickname" 
                class="w-full p-3 rounded mb-4 bg-gray-800 text-white outline-none focus:ring-2 focus:ring-blue-500"
            />
            <button 
                id="start-btn"
                class="w-full p-3 rounded font-bold transition hover:opacity-90 bg-green text-white"
            >
                Start Trading
            </button>
            <div id="login-error" class="text-red mt-2 text-sm text-center hidden"></div>
        </div>
    </div>

    <!-- MAIN APP SCREEN (Hidden initially) -->
    <div id="app-screen" class="hidden flex-1 flex flex-col h-screen overflow-hidden">
        
        <!-- HEADER -->
        <header class="flex justify-between items-center p-4 border-b bg-panel border-panelBorder">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black tracking-tight">MOCK<span class="text-blue-500">EX</span></h1>
                <div class="flex gap-2" id="asset-tabs">
                    <button data-asset="STOCK_A" class="asset-tab px-4 py-1.5 rounded-full text-sm font-semibold transition bg-blue-600 text-white">Stock A</button>
                    <button data-asset="CRYPTO_A" class="asset-tab px-4 py-1.5 rounded-full text-sm font-semibold transition hover:bg-gray-800 text-textMuted">Crypto A</button>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <div class="text-xs font-semibold uppercase tracking-wider text-textMuted">Trader</div>
                    <div class="font-bold" id="display-nickname">---</div>
                </div>
                <div class="text-right">
                    <div class="text-xs font-semibold uppercase tracking-wider text-textMuted">Cash Balance</div>
                    <div class="font-mono" id="display-balance">$0.00</div>
                </div>
                <div class="text-right">
                    <div class="text-xs font-semibold uppercase tracking-wider text-textMuted">Net Worth</div>
                    <div class="font-mono text-blue-400 font-bold" id="display-networth">$0.00</div>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col lg:flex-row p-4 gap-4 overflow-hidden">
            
            <!-- CHART COLUMN -->
            <div class="flex-1 flex flex-col rounded-xl border overflow-hidden bg-panel border-panelBorder">
                <div class="p-4 border-b flex justify-between items-end border-panelBorder">
                    <div>
                        <h2 class="text-2xl font-bold" id="chart-title">STOCK_A</h2>
                        <div class="text-sm text-textMuted">
                            Supply Available: <span class="text-white font-mono" id="display-supply">---</span> / 1000
                        </div>
                    </div>
                    <div class="text-3xl font-mono text-green" id="display-price">
                        $---
                    </div>
                </div>
                <div class="flex-1 relative" id="chart-container">
                    <!-- Chart goes here -->
                </div>
            </div>

            <!-- TRADING COLUMN -->
            <div class="w-full lg:w-80 flex flex-col gap-4">
                <div class="p-5 rounded-xl border flex flex-col gap-4 bg-panel border-panelBorder">
                    <h3 class="font-bold uppercase tracking-wider text-sm text-textMuted">Order Entry</h3>
                    
                    <div class="bg-gray-900 rounded border border-gray-700 flex items-center p-2">
                        <input 
                            type="number" 
                            id="order-qty"
                            placeholder="0.00"
                            class="bg-transparent text-right font-mono text-lg w-full outline-none text-white"
                        />
                        <span class="ml-2 font-semibold text-gray-500">Shares</span>
                    </div>

                    <div class="text-xs flex justify-between font-mono text-textMuted">
                        <span>Est. Fee:</span>
                        <span id="est-fee">$100.00</span>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <button onclick="executeTrade('BUY')" class="py-3 rounded font-bold transition hover:opacity-80 bg-green text-white">Buy Long</button>
                        <button onclick="executeTrade('SELL')" class="py-3 rounded font-bold transition hover:opacity-80 border border-green text-green">Sell Long</button>
                        <button onclick="executeTrade('SHORT')" class="py-3 rounded font-bold transition hover:opacity-80 mt-2 bg-red text-white">Short Sell</button>
                        <button onclick="executeTrade('COVER')" class="py-3 rounded font-bold transition hover:opacity-80 border border-red text-red mt-2">Cover Short</button>
                    </div>
                </div>

                <!-- POSITIONS WIDGET -->
                <div class="flex-1 rounded-xl border flex flex-col overflow-hidden bg-panel border-panelBorder">
                    <h3 class="p-4 font-bold uppercase tracking-wider text-sm border-b text-textMuted border-panelBorder">Active Positions</h3>
                    <div class="flex-1 overflow-y-auto p-4 space-y-3" id="positions-list">
                        <!-- Positions injected here via JS -->
                        <div class="text-center text-sm mt-10 text-textMuted">No open positions</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- CONSTANTS & API ---
        const API_BASE = 'https://ise.fullynerfed.workers.dev';
        const BASE_FEE = 100;
        const VAR_FEE_RATE = 0.0001;
        
        // --- APP STATE ---
        let user = { id: null, nickname: '', balance: 0 };
        let activeAsset = 'STOCK_A';
        let positions = []; // { id, asset, type, shares, entryPrice }
        let marketData = {
            STOCK_A: { price: 50, available_shares: 1000 },
            CRYPTO_A: { price: 50, available_shares: 1000 }
        };
        let chartData = {
            STOCK_A: [],
            CRYPTO_A: []
        };
        
        // --- CHART VARIABLES ---
        let chart = null;
        let candlestickSeries = null;

        // --- DOM ELEMENTS ---
        const els = {
            loginScreen: document.getElementById('login-screen'),
            appScreen: document.getElementById('app-screen'),
            nicknameInput: document.getElementById('nickname-input'),
            startBtn: document.getElementById('start-btn'),
            loginError: document.getElementById('login-error'),
            displayNickname: document.getElementById('display-nickname'),
            displayBalance: document.getElementById('display-balance'),
            displayNetworth: document.getElementById('display-networth'),
            chartTitle: document.getElementById('chart-title'),
            displaySupply: document.getElementById('display-supply'),
            displayPrice: document.getElementById('display-price'),
            orderQty: document.getElementById('order-qty'),
            estFee: document.getElementById('est-fee'),
            positionsList: document.getElementById('positions-list'),
            chartContainer: document.getElementById('chart-container'),
            assetTabs: document.querySelectorAll('.asset-tab')
        };

        // --- INITIALIZATION ---
        function initChart() {
            chart = LightweightCharts.createChart(els.chartContainer, {
                layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#848E9C' },
                grid: { vertLines: { color: '#2B3139' }, horzLines: { color: '#2B3139' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { timeVisible: true, secondsVisible: true }
            });
            
            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#2EBD85', downColor: '#F6465D', borderVisible: false,
                wickUpColor: '#2EBD85', wickDownColor: '#F6465D'
            });

            new ResizeObserver(() => {
                chart.applyOptions({ width: els.chartContainer.clientWidth, height: els.chartContainer.clientHeight });
            }).observe(els.chartContainer);

            // Init empty candles
            const now = Math.floor(Date.now() / 1000);
            ['STOCK_A', 'CRYPTO_A'].forEach(asset => {
                chartData[asset] = [{ time: now, open: 50, high: 50, low: 50, close: 50 }];
            });
            candlestickSeries.setData(chartData[activeAsset]);
        }

        // --- EVENT LISTENERS ---
        els.startBtn.addEventListener('click', async () => {
            const nickname = els.nicknameInput.value.trim();
            if (!nickname) return;
            
            els.startBtn.innerText = "Connecting...";
            els.startBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname })
                });
                
                if (!res.ok) throw new Error("Failed to register");
                const data = await res.json();
                
                user = { id: data.id, nickname: data.nickname, balance: data.balance };
                
                els.loginScreen.classList.add('hidden');
                els.appScreen.classList.remove('hidden');
                
                els.displayNickname.innerText = user.nickname;
                updateStats();
                initChart();
                
                // Start polling market
                pollMarket();
                setInterval(pollMarket, 2000); // Poll every 2 seconds

            } catch (err) {
                els.loginError.innerText = "Error connecting to worker. Is it deployed?";
                els.loginError.classList.remove('hidden');
                els.startBtn.innerText = "Start Trading";
                els.startBtn.disabled = false;
            }
        });

        els.assetTabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                activeAsset = e.target.dataset.asset;
                
                // Update UI Tabs
                els.assetTabs.forEach(t => {
                    if(t.dataset.asset === activeAsset) {
                        t.className = "asset-tab px-4 py-1.5 rounded-full text-sm font-semibold transition bg-blue-600 text-white";
                    } else {
                        t.className = "asset-tab px-4 py-1.5 rounded-full text-sm font-semibold transition hover:bg-gray-800 text-textMuted";
                    }
                });

                els.chartTitle.innerText = activeAsset;
                candlestickSeries.setData(chartData[activeAsset]);
                updateUI();
            });
        });

        els.orderQty.addEventListener('input', () => {
            const qty = parseFloat(els.orderQty.value) || 0;
            const price = marketData[activeAsset].price;
            const fee = BASE_FEE + (qty * price * VAR_FEE_RATE);
            els.estFee.innerText = `$${fee.toFixed(2)}`;
        });

        // --- POLLING & DATA ---
        async function pollMarket() {
            try {
                const res = await fetch(`${API_BASE}/api/market`);
                if (!res.ok) return;
                const markets = await res.json();
                
                const now = Math.floor(Date.now() / 1000);
                const currentCandleTime = Math.floor(now / 5) * 5;

                markets.forEach(m => {
                    const id = m.asset;
                    marketData[id] = { price: m.price, available_shares: m.available_shares };
                    
                    const series = chartData[id];
                    const lastCandle = series[series.length - 1];
                    const newPrice = m.price;

                    if (lastCandle.time === currentCandleTime) {
                        lastCandle.high = Math.max(lastCandle.high, newPrice);
                        lastCandle.low = Math.min(lastCandle.low, newPrice);
                        lastCandle.close = newPrice;
                    } else {
                        series.push({
                            time: currentCandleTime,
                            open: lastCandle.close,
                            high: Math.max(lastCandle.close, newPrice),
                            low: Math.min(lastCandle.close, newPrice),
                            close: newPrice
                        });
                    }
                    if (series.length > 200) series.shift();
                });

                // Update chart if it's the active asset
                if (candlestickSeries && chartData[activeAsset]) {
                    candlestickSeries.update(chartData[activeAsset][chartData[activeAsset].length - 1]);
                }
                
                updateUI();
                renderPositions();
            } catch (err) {
                console.error("Market poll error:", err);
            }
        }

        // --- TRADING LOGIC ---
        async function executeTrade(action) {
            const qty = parseFloat(els.orderQty.value);
            if (isNaN(qty) || qty <= 0) return alert("Enter a valid quantity");

            try {
                // Optimistic UI checks based on local state
                const mkt = marketData[activeAsset];
                const existingPosIdx = positions.findIndex(p => p.asset === activeAsset);
                const existingPos = positions[existingPosIdx];

                if ((action === 'BUY' || action === 'COVER') && mkt.available_shares < qty) {
                    return alert(`Only ${Math.floor(mkt.available_shares)} shares available`);
                }
                if (action === 'BUY' && existingPos && existingPos.type === 'SHORT') return alert("Cover your short first!");
                if (action === 'SELL' && (!existingPos || existingPos.type !== 'LONG' || existingPos.shares < qty)) return alert("Not enough long shares to sell");
                if (action === 'SHORT' && existingPos && existingPos.type === 'LONG') return alert("Sell your long first!");
                if (action === 'COVER' && (!existingPos || existingPos.type !== 'SHORT' || existingPos.shares < qty)) return alert("Not enough short shares to cover");

                // Call Worker API
                const res = await fetch(`${API_BASE}/api/trade`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.id, asset: activeAsset, action, shares: qty })
                });

                const result = await res.json();
                if (!res.ok) throw new Error(result.error || "Trade failed");

                // Success! Update local state to reflect the transaction
                const fillPrice = result.fillPrice;
                const totalFee = result.totalFee;
                const costOrRev = fillPrice * qty;

                // Update Balance & Positions accurately based on the transaction action
                if (action === 'BUY') {
                    user.balance -= (costOrRev + totalFee);
                    if (existingPos) {
                        existingPos.entryPrice = ((existingPos.entryPrice * existingPos.shares) + (fillPrice * qty)) / (existingPos.shares + qty);
                        existingPos.shares += qty;
                    } else {
                        positions.push({ id: crypto.randomUUID(), asset: activeAsset, type: 'LONG', shares: qty, entryPrice: fillPrice });
                    }
                } else if (action === 'SELL') {
                    user.balance += (costOrRev - totalFee);
                    existingPos.shares -= qty;
                    if (existingPos.shares <= 0) positions.splice(existingPosIdx, 1);
                } else if (action === 'SHORT') {
                    user.balance += (costOrRev - totalFee);
                    if (existingPos) {
                        existingPos.entryPrice = ((existingPos.entryPrice * existingPos.shares) + (fillPrice * qty)) / (existingPos.shares + qty);
                        existingPos.shares += qty;
                    } else {
                        positions.push({ id: crypto.randomUUID(), asset: activeAsset, type: 'SHORT', shares: qty, entryPrice: fillPrice });
                    }
                } else if (action === 'COVER') {
                    user.balance -= (costOrRev + totalFee);
                    existingPos.shares -= qty;
                    if (existingPos.shares <= 0) positions.splice(existingPosIdx, 1);
                }

                els.orderQty.value = '';
                els.estFee.innerText = `$${BASE_FEE.toFixed(2)}`;
                
                // Immediately refresh market data from backend
                await pollMarket(); 
                
            } catch (err) {
                alert(err.message);
            }
        }

        // --- UI UPDATES ---
        function updateUI() {
            const mkt = marketData[activeAsset];
            els.displaySupply.innerText = mkt.available_shares.toFixed(2);
            
            els.displayPrice.innerText = `$${mkt.price.toFixed(2)}`;
            if (mkt.price >= 50) { // Using 50 as baseline for color logic 
                els.displayPrice.className = "text-3xl font-mono text-green";
            } else {
                els.displayPrice.className = "text-3xl font-mono text-red";
            }
            updateStats();
        }

        function updateStats() {
            let nw = user.balance;
            positions.forEach(p => {
                const currentPrice = marketData[p.asset].price;
                if (p.type === 'LONG') nw += (p.shares * currentPrice);
                else if (p.type === 'SHORT') nw -= (p.shares * currentPrice);
            });
            
            els.displayBalance.innerText = `$${user.balance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2})}`;
            els.displayNetworth.innerText = `$${nw.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2})}`;
        }

        function renderPositions() {
            if (positions.length === 0) {
                els.positionsList.innerHTML = '<div class="text-center text-sm mt-10 text-textMuted">No open positions</div>';
                return;
            }

            els.positionsList.innerHTML = positions.map(pos => {
                const curPrice = marketData[pos.asset].price;
                const pnl = pos.type === 'LONG' 
                    ? (curPrice - pos.entryPrice) * pos.shares
                    : (pos.entryPrice - curPrice) * pos.shares;
                
                const pnlColorClass = pnl >= 0 ? 'text-green' : 'text-red';
                const pnlSign = pnl >= 0 ? '+' : '-';
                const badgeClass = pos.type === 'LONG' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300';

                return `
                    <div class="p-3 rounded bg-gray-900 border border-gray-800 text-sm">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold">${pos.asset}</span>
                            <span class="px-2 py-0.5 rounded text-xs font-bold ${badgeClass}">${pos.type}</span>
                        </div>
                        <div class="flex justify-between font-mono text-xs mb-1 text-textMuted">
                            <span>Size: ${pos.shares}</span>
                            <span>Entry: $${pos.entryPrice.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between font-mono font-bold mt-2">
                            <span>PnL:</span>
                            <span class="${pnlColorClass}">${pnlSign}$${Math.abs(pnl).toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

    </script>
</body>
</html>
